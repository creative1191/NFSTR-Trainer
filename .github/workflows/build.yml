name: Build NFSTR_Trainer.exe

# This workflow automatically builds the Windows .exe every time
# you push code or create a release. The .exe is uploaded as a
# build artifact, and attached to releases automatically.
#
# Uses latest action versions that support Node.js 24 (no deprecation warning).

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write  # Needed for creating releases

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          # Latest versions of setup-python target Node.js 24 by default,
          # which avoids the Node.js 20 deprecation warning.

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --console `
            --name "NFSTR_Trainer" `
            --hidden-import pymem `
            --hidden-import pymem.process `
            --hidden-import pymem.pattern `
            --collect-all pymem `
            --collect-all keyboard `
            nfs_trainer.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: NFSTR_Trainer-${{ github.sha }}
          path: dist/NFSTR_Trainer.exe
          if-no-files-found: error

      - name: Attach to Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NFSTR_Trainer.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test Python syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Verify Python syntax
        run: |
          python -c "import ast; ast.parse(open('nfs_trainer.py').read()); print('Syntax OK')"
